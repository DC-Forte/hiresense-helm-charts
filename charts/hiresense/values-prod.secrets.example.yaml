# ─────────────────────────────────────────────────────────────────────────────
# HireSense — production secrets (EXAMPLE / TEMPLATE)
#
# Copy this file to `values-prod.secrets.yaml`, fill in real values from your
# provisioned infrastructure, and keep it OUT of version control.
#
# Install:
#   helm upgrade --install hiresense ./hiresense -n hiresense-app \
#     -f hiresense/values-prod.yaml \
#     -f hiresense/values-prod.secrets.yaml
#
# Generate the application secrets with e.g.:  openssl rand -hex 32
# ─────────────────────────────────────────────────────────────────────────────
secrets:
  # Managed databases
  databaseUrl: "postgresql://<user>:<pw>@<pg-host>:25060/hiresense?sslmode=require"
  redisUrl:    "rediss://default:<pw>@<redis-host>:25061"
  mongodbUri:  "mongodb://<user>:<pw>@<mongo-vpc-ip>:27017/chapter_ai_interview?authSource=admin"

  # Application secrets — generate fresh per environment
  jwtSecret:            "<generate>"
  candidateJwtSecret:   "<generate>"
  jwtRefreshSecret:     "<generate>"
  sessionSecret:        "<generate>"
  encryptionKey:        "<generate-32-byte>"
  internalServiceToken: "<generate>"

  # Third-party providers
  azureOpenaiApiKey: "<azure-openai-key>"
  livekitApiKey:     "<livekit-key>"
  livekitApiSecret:  "<livekit-secret>"
  smtpPass:          "<sendgrid-api-key>"
  googleClientId:     "<google-oauth-client-id>"
  googleClientSecret: "<google-oauth-client-secret>"
  # githubClientId / githubClientSecret are optional
  githubClientId:     ""
  githubClientSecret: ""

  # Object storage (DigitalOcean Spaces, S3-compatible)
  spaces:
    accessKey: "<spaces-access-key>"
    secretKey: "<spaces-secret-key>"
    endpoint:  "https://fra1.digitaloceanspaces.com"
    region:    "fra1"
    bucket:    "<spaces-bucket-name>"
