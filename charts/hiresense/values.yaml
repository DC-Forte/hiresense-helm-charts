# Default values for hiresense chart. Production overrides in values-prod.yaml,
# secrets in values-prod.secrets.yaml (gitignored).

global:
  namespace: hiresense-app
  registry: ghcr.io/dc-forte
  imagePullPolicy: Always
  imagePullSecret: ghcr-pull

hosts:
  candidate: hiresense.dc-forte.com
  recruiter: hiresense-recruiter.dc-forte.com
  api:       hiresense-api.dc-forte.com
  ai:        hiresense-ai.dc-forte.com
  grafana:   ""  # set in values-prod.yaml to add grafana.dc-forte.com to TLS cert

istio:
  enabled: true
  gateway: hiresense-gateway
  ingressSelector:
    istio: ingressgateway

tls:
  enabled: true
  issuer: letsencrypt-prod
  secretName: hiresense-tls
  # Set true if you want Helm to also create the ClusterIssuer + Certificate.
  # Default false because we adopted pre-existing cert-manager resources.
  manageCertManager: false

backend:
  image:
    repository: chapter-interview-go-backend
    tag: latest
  replicas: 2
  port: 5000  # HTTP and WS share the same port
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1.5Gi

aiEngine:
  image:
    repository: chapter-interview-python-backend
    tag: latest
  replicas: 2
  port: 9091
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1.5Gi

frontend:
  image:
    repository: chapter-interview-frontend
    tag: latest
  replicas: 2
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

worker:
  enabled: true
  image:
    repository: chapter-interview-go-worker  # separate Dockerfile target --target worker
    tag: latest
  replicas: 1
  command: []  # CMD /app/worker is baked into the image; empty = use image default
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

# Non-secret env. Secrets are below in `secrets:`, populated via
# values-prod.secrets.yaml (gitignored).
env:
  ENVIRONMENT: production
  PORT: "5000"
  DB_SSL_MODE: require
  DB_POOL_MAX: "25"
  DB_POOL_MIN: "5"
  LLM_TIMEOUT_MS: "120000"
  CANDIDATE_AUTH_V2: "true"
  RECORDING_STORAGE_PROVIDER: spaces
  AWS_REGION: fra1
  # AZURE_OPENAI_API_VERSION: "2025-01-01-preview"
  # AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-5.2"
  # AZURE_OPENAI_ENDPOINT: "https://chapterfoundry.cognitiveservices.azure.com/"
  OPENAI_MODEL: "gpt-5.2"
  LIVEKIT_URL: "wss://dc-forte-c3qnkc6a.livekit.cloud"
  LIVEKIT_AGENT_NAME: "dc-forte-voice-agent"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "engage@dc-forte.com"
  FROM_EMAIL: "contact@dc-forte.com"
  FEEDBACK_WORKER_ENABLED: "true"
  RECORDING_WORKER_ENABLED: "true"
  RESUME_UPLOAD_WORKER_ENABLED: "true"
  EMAIL_WORKER_ENABLED: "true"
  # Worker tuning
  FEEDBACK_WORKER_POLL_INTERVAL_SECONDS: "30"
  FEEDBACK_WORKER_BATCH_SIZE: "5"
  FEEDBACK_WORKER_MAX_RETRIES: "5"
  RECORDING_WORKER_POLL_INTERVAL_SECONDS: "60"
  RESUME_UPLOAD_POLL_INTERVAL_SECONDS: "10"
  RESUME_UPLOAD_BATCH_SIZE: "5"
  EMAIL_WORKER_POLL_INTERVAL_SECONDS: "30"
  EMAIL_WORKER_BATCH_SIZE: "10"
  # LLM
  LLM_RETRY_COUNT: "2"
  # Auth / JWT expiry
  JWT_ACCESS_EXPIRY_MINUTES: "15"
  JWT_REFRESH_EXPIRY_DAYS: "7"
  ADMIN_PERM_CACHE_TTL_SECONDS: "300"
  # Rate limits
  RATE_LIMIT_MAX: "10000"
  RATE_LIMIT_WINDOW_SECONDS: "900"
  AUTH_RATE_LIMIT_MAX: "200"
  OTP_RATE_LIMIT_MAX: "10"
  # Safety
  ALLOW_DEGRADED_PROMPTS: "0"

# All values below are placeholders. Real values are injected via
# values-prod.secrets.yaml (gitignored, produced from `terraform output`).
secrets:
  databaseUrl: ""           # postgresql://user:pw@host:25060/hiresense?sslmode=require
  redisUrl: ""              # rediss://default:pw@host:25061
  mongodbUri: ""            # mongodb://user:pw@10.x.x.x:27017/chapter_ai_interview?authSource=...
  jwtSecret: ""
  candidateJwtSecret: ""
  jwtRefreshSecret: ""
  sessionSecret: ""
  encryptionKey: ""
  internalServiceToken: ""
  openaiApiKey: ""
  livekitApiKey: ""
  livekitApiSecret: ""
  smtpPass: ""
  googleClientId: ""
  googleClientSecret: ""
  candidateGithubClientId: ""
  candidateGithubClientSecret: ""
  spaces:
    accessKey: ""
    secretKey: ""
    endpoint: "https://fra1.digitaloceanspaces.com"
    region: "fra1"
    bucket: "hiresense"

# Frontend runtime env (injected by docker-entrypoint.sh into bundle)
frontendEnv:
  VITE_API_BASE_URL: "https://hiresense-api.dc-forte.com/api"
  VITE_ADMIN_API_BASE_URL: "https://hiresense-api.dc-forte.com/api/admin-api"
  VITE_FRONTEND_URL: "https://hiresense-recruiter.dc-forte.com"
  VITE_CANDIDATE_PORTAL_URL: "https://hiresense.dc-forte.com"
  VITE_LIVEKIT_URL: "wss://dc-forte-c3qnkc6a.livekit.cloud"
  VITE_AGENTIC_API_URL: "https://hiresense-api.dc-forte.com/api/agentic"
  VITE_AGENTIC_WS_URL: "wss://hiresense-api.dc-forte.com/ws/interview"
  VITE_PYTHON_API_URL: "https://hiresense-ai.dc-forte.com"
  VITE_PYTHON_URL: "https://hiresense-ai.dc-forte.com"
  VITE_SIGNALING_URL: "wss://hiresense-api.dc-forte.com"
  VITE_WS_URL: "wss://hiresense-api.dc-forte.com"
  VITE_ENABLE_LIVEKIT: "true"
  VITE_ENABLE_TEXT_INTERVIEW: "true"
  VITE_ENABLE_WEBRTC: "true"
  VITE_THEME_PROFILE: "hiresense"
  VITE_ENV: "production"

certManager:
  email: ops@dc-forte.com

# Monitoring integration — connects the app to the monitoring chart.
monitoring:
  # OTLP endpoint for distributed tracing (backend + worker → Tempo).
  # Set to "tempo.monitoring.svc.cluster.local:4318" when monitoring chart is installed.
  otlpEndpoint: ""

  # Port the worker exposes Prometheus /metrics on.
  workerMetricsPort: "9091"

  # Set true to deploy ServiceMonitor resources for Prometheus scraping.
  # Requires kube-prometheus-stack installed in the monitoring namespace.
  serviceMonitor:
    enabled: false
    # Labels added to ServiceMonitors — must match Prometheus serviceMonitorSelector.
    # kube-prometheus-stack with serviceMonitorSelector: {} matches any label.
    labels: {}
