{{- if and .Values.tls.enabled .Values.tls.manageCertManager }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.tls.issuer }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.tls.issuer }}-account-key
    solvers:
      - http01:
          ingress:
            class: istio
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hiresense-tls
  namespace: istio-system
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ .Values.tls.issuer }}
    kind: ClusterIssuer
  commonName: {{ .Values.hosts.candidate | quote }}
  dnsNames:
    - {{ .Values.hosts.candidate | quote }}
    - {{ .Values.hosts.recruiter | quote }}
    - {{ .Values.hosts.api | quote }}
    - {{ .Values.hosts.ai | quote }}
    {{- if .Values.hosts.grafana }}
    - {{ .Values.hosts.grafana | quote }}
    {{- end }}
{{- end }}
