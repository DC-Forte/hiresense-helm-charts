{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hiresense-candidate
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "hiresense.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.hosts.candidate | quote }}
  gateways:
    - {{ .Values.istio.gateway }}
  http:
    - route:
        - destination:
            host: hiresense-frontend-candidate.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hiresense-recruiter
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "hiresense.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.hosts.recruiter | quote }}
  gateways:
    - {{ .Values.istio.gateway }}
  http:
    - route:
        - destination:
            host: hiresense-frontend-recruiter.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hiresense-api
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "hiresense.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.hosts.api | quote }}
  gateways:
    - {{ .Values.istio.gateway }}
  http:
    - match:
        - uri:
            prefix: /ws
      route:
        - destination:
            host: hiresense-backend.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.backend.wsPort }}
      websocketUpgrade: true
    - route:
        - destination:
            host: hiresense-backend.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.backend.port }}
      timeout: 120s
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: hiresense-ai
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "hiresense.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ .Values.hosts.ai | quote }}
  gateways:
    - {{ .Values.istio.gateway }}
  http:
    - route:
        - destination:
            host: hiresense-ai-engine.{{ .Values.global.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.aiEngine.port }}
      timeout: 120s
{{- end }}
