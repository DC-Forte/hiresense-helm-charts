apiVersion: v1
kind: Service
metadata:
  name: hiresense-backend
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "hiresense.labels" . | nindent 4 }}
    app: hiresense-backend
spec:
  type: ClusterIP
  selector:
    app: hiresense-backend
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
