{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.istio.gateway }}
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "hiresense.labels" . | nindent 4 }}
spec:
  selector:
    {{- toYaml .Values.istio.ingressSelector | nindent 4 }}
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - {{ .Values.hosts.candidate | quote }}
        - {{ .Values.hosts.recruiter | quote }}
        - {{ .Values.hosts.api | quote }}
        - {{ .Values.hosts.ai | quote }}
      {{- if .Values.tls.enabled }}
      tls:
        httpsRedirect: true
      {{- end }}
    {{- if .Values.tls.enabled }}
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - {{ .Values.hosts.candidate | quote }}
        - {{ .Values.hosts.recruiter | quote }}
        - {{ .Values.hosts.api | quote }}
        - {{ .Values.hosts.ai | quote }}
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.tls.secretName }}
    {{- end }}
{{- end }}
