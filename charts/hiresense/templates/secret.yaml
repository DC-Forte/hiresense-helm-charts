apiVersion: v1
kind: Secret
metadata:
  name: hiresense-secrets
  namespace: {{ .Values.global.namespace }}
  labels: {{- include "hiresense.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required" .Values.secrets.databaseUrl | quote }}
  MONGODB_URI: {{ required "secrets.mongodbUri is required" .Values.secrets.mongodbUri | quote }}
  REDIS_URL: {{ required "secrets.redisUrl is required" .Values.secrets.redisUrl | quote }}
  JWT_SECRET: {{ required "secrets.jwtSecret is required" .Values.secrets.jwtSecret | quote }}
  CANDIDATE_JWT_SECRET: {{ required "secrets.candidateJwtSecret is required" .Values.secrets.candidateJwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ required "secrets.jwtRefreshSecret is required" .Values.secrets.jwtRefreshSecret | quote }}
  SESSION_SECRET: {{ required "secrets.sessionSecret is required" .Values.secrets.sessionSecret | quote }}
  ENCRYPTION_KEY: {{ required "secrets.encryptionKey is required" .Values.secrets.encryptionKey | quote }}
  INTERNAL_SERVICE_TOKEN: {{ required "secrets.internalServiceToken is required" .Values.secrets.internalServiceToken | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | default "" | quote }}
  LIVEKIT_API_KEY: {{ required "secrets.livekitApiKey is required" .Values.secrets.livekitApiKey | quote }}
  LIVEKIT_API_SECRET: {{ required "secrets.livekitApiSecret is required" .Values.secrets.livekitApiSecret | quote }}
  SMTP_PASS: {{ required "secrets.smtpPass is required" .Values.secrets.smtpPass | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | default "" | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | default "" | quote }}
  CANDIDATE_GITHUB_CLIENT_ID: {{ .Values.secrets.candidateGithubClientId | default "" | quote }}
  CANDIDATE_GITHUB_CLIENT_SECRET: {{ .Values.secrets.candidateGithubClientSecret | default "" | quote }}
  OPENAI_API_KEY: {{ coalesce .Values.secrets.openaiApiKey .Values.secrets.azureOpenaiApiKey "" | quote }}

  # Spaces (S3-compatible)
  S3_ACCESS_KEY: {{ .Values.secrets.spaces.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.spaces.secretKey | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.spaces.accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.spaces.secretKey | quote }}
  IMAGE_S3_ACCESS_KEY: {{ .Values.secrets.spaces.accessKey | quote }}
  IMAGE_S3_SECRET_KEY: {{ .Values.secrets.spaces.secretKey | quote }}
  CERTIFICATE_S3_ACCESS_KEY: {{ .Values.secrets.spaces.accessKey | quote }}
  CERTIFICATE_S3_SECRET_KEY: {{ .Values.secrets.spaces.secretKey | quote }}

  # Parsed legacy DB_* (some code reads these instead of DATABASE_URL)
  DB_HOST: {{ regexReplaceAll "^postgresql://[^:]+:[^@]+@([^:/?]+).*$" .Values.secrets.databaseUrl "${1}" | quote }}
  DB_PORT: {{ regexReplaceAll "^postgresql://[^:]+:[^@]+@[^:]+:([0-9]+).*$" .Values.secrets.databaseUrl "${1}" | quote }}
  DB_NAME: {{ regexReplaceAll "^postgresql://[^:]+:[^@]+@[^/]+/([^?]+).*$" .Values.secrets.databaseUrl "${1}" | quote }}
  DB_USER: {{ regexReplaceAll "^postgresql://([^:]+):[^@]+@.*$" .Values.secrets.databaseUrl "${1}" | quote }}
  DB_PASSWORD: {{ regexReplaceAll "^postgresql://[^:]+:([^@]+)@.*$" .Values.secrets.databaseUrl "${1}" | quote }}
