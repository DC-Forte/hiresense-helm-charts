# ─────────────────────────────────────────────────────────────────────────────
# hiresense-monitoring — production secrets (EXAMPLE / TEMPLATE)
#
# Copy to values-prod.secrets.yaml, fill in real values, keep OUT of git.
#
# Loki and Tempo share the same "hiresense" bucket as the backend app
# (prefixes: loki/ and tempo/). Use the same Spaces credentials.
# ─────────────────────────────────────────────────────────────────────────────

kube-prometheus-stack:
  grafana:
    adminPassword: "<generate: openssl rand -hex 16>"

loki:
  loki:
    storage:
      s3:
        accessKeyId: "<spaces-access-key>"       # same as hiresense secrets.spaces.accessKey
        secretAccessKey: "<spaces-secret-key>"   # same as hiresense secrets.spaces.secretKey

tempo:
  tempo:
    storage:
      trace:
        s3:
          access_key: "<spaces-access-key>"      # same as hiresense secrets.spaces.accessKey
          secret_key: "<spaces-secret-key>"      # same as hiresense secrets.spaces.secretKey
