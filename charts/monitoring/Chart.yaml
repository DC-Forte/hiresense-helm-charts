apiVersion: v2
name: hiresense-monitoring
description: Observability stack — Prometheus, Grafana, Loki, Tempo, Promtail
type: application
version: 0.1.0

# Pin chart versions. Update with:
#   helm search repo prometheus-community/kube-prometheus-stack
#   helm search repo grafana/loki
#   helm search repo grafana/tempo
#   helm search repo grafana/promtail
dependencies:
  - name: kube-prometheus-stack
    version: "65.3.1"
    repository: https://prometheus-community.github.io/helm-charts

  - name: loki
    version: "6.7.4"
    repository: https://grafana.github.io/helm-charts

  - name: tempo
    version: "1.14.0"
    repository: https://grafana.github.io/helm-charts

  - name: promtail
    version: "6.16.6"
    repository: https://grafana.github.io/helm-charts
